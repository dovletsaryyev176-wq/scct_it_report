{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Çäreler</h3>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addEventModal">+ Täze çäre</button>
</div>

<div class="bg-white rounded shadow-sm">
    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>Çäräniň ady</th>
                <th>Maksatnama</th>
                <th>Jogapkärler</th>
                <th class="text-end">Amallar</th>
            </tr>
        </thead>
        <tbody>
            {% for e in events %}
            <tr>
                <td>{{ e.item_number }}</td>
                <td>{{ e.name }} <br> <small class="text-primary">{{ e.deadline }}</small></td>
                <td><small>{{ e.program_name }}</small></td>
                <td><small class="text-muted">{{ e.org_names }}</small></td>
                <td class="text-end">
                     </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form method="POST" class="modal-content border-0">
            <div class="modal-header"><h5>Täze çäre</h5></div>
            <div class="modal-body row g-3">
                <div class="col-md-2"><label>№</label><input type="text" name="item_number" class="form-control"></div>
                <div class="col-md-10">
                    <label>Maksatnama</label>
                    <select name="program_id" class="form-select">
                        {% for p in programs %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-12"><label>Çäräniň ady</label><textarea name="name" class="form-control"></textarea></div>
                <div class="col-md-6"><label>Möhleti</label><input type="text" name="deadline" class="form-control"></div>
                <div class="col-md-6">
                    <label>Jogapkär edaralar</label>
                    <select name="org_ids" class="form-select" multiple style="height: 100px;">
                        {% for o in organizations %}<option value="{{o.id}}">{{o.name}}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-success">Sakla</button></div>
        </form>
    </div>
</div>
{% endblock %}
